openapi: 3.0.3
info:
  title: Payment Gateway Orchestrator API
  version: 1.0.0
  description: Central API for company-authenticated card payment processing, settlement, and audit logs.

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Payments
  - name: Settlements
  - name: Logs
  - name: System

components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-Api-Key

  schemas:
    PaymentRequest:
      type: object
      required: [amount, pan, cvv, cardHolder, externalReference]
      properties:
        amount:
          type: number
          example: 150000
        currency:
          type: string
          example: COP
        pan:
          type: string
          example: "5500005555555559"
        cvv:
          type: string
          example: "321"
        cardHolder:
          type: string
          example: "Jane Doe"
        externalReference:
          type: string
          example: "TICKET-ORDER-001"
        description:
          type: string
          example: "Two concert tickets"

    SettlementRequest:
      type: object
      required: [transactionIds]
      properties:
        transactionIds:
          type: array
          items:
            type: string

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      responses:
        "200":
          description: Service is running

  /api/payments/process-payment:
    post:
      tags: [Payments]
      summary: Process a card payment
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequest"
      responses:
        "201":
          description: Payment approved
        "402":
          description: Payment rejected
        "409":
          description: Duplicate external reference
        "422":
          description: Invalid input

  /api/payments/{id}:
    get:
      tags: [Payments]
      summary: Get a transaction by ID
      security:
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transaction found
        "404":
          description: Transaction not found

  /api/settlements/settle:
    post:
      tags: [Settlements]
      summary: Settle approved transactions
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettlementRequest"
      responses:
        "200":
          description: Transactions settled

  /api/settlements/report:
    get:
      tags: [Settlements]
      summary: Get settlement report
      security:
        - ApiKey: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Report generated

  /api/settlements/summary:
    get:
      tags: [Settlements]
      summary: Get company transaction summary
      security:
        - ApiKey: []
      responses:
        "200":
          description: Summary generated

  /api/logs:
    get:
      tags: [Logs]
      summary: List database logs
      parameters:
        - name: transactionId
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Logs returned

  /api/logs/file:
    get:
      tags: [Logs]
      summary: Read file logs
      responses:
        "200":
          description: File logs returned
